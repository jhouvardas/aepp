<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Πρόχειρο Μεζεδακίου</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            padding: 50px;
            background-color: #f8f9fa;
        }

        .preview-box {
            background: white;
            padding: 20px;
            border-left: 5px solid #17a2b8;
            /* Μόνο μια κομψή γραμμή αριστερά αντί για γύρω-γύρω */
            border-bottom: 1px solid #dee2e6;
            width: 100%;
            min-height: 100vh;
            /* Να πιάνει όλο το ύψος της οθόνης */
            margin: 0;
            border-radius: 0;
            /* Αφαιρούμε τις γωνίες για να "κολλάει" στις άκρες */
        }

        body {
            padding: 0 !important;
            /* Αφαιρούμε το padding που σου είχα δώσει πριν */
            margin: 0;
        }
    </style>
</head>

<body>

    <div class="container-fluid px-0">

        <div class="preview-box">
            <html>
            <h2>Με ΟΣΟ</h2>

            </html>

        </div>
    </div>

</body>

</html>
