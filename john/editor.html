<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <title>4.36 Αριθμητήριο - Προεπισκόπηση</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../aepp.css">
    <style>
        body {
            padding: 0 !important;
            margin: 0;
        }

        .preview-box {
            background: white;
            padding: 20px;
            border-left: 5px solid #17a2b8;
            min-height: 100vh;
        }
    </style>
</head>

<body class="bg-light">
    <div class="sticky-top bg-dark p-2 d-flex justify-content-between align-items-center shadow">
        <span class="text-white ms-3 fw-bold small"><i class="fa fa-eye text-info"></i> ΠΡΟΕΠΙΣΚΟΠΗΣΗ ΕΚΦΩΝΗΣΗΣ</span>
        <button onclick="copyMezeHTML()" class="btn btn-success btn-sm me-3 fw-bold">
            <i class="fa fa-copy"></i> Αντιγραφή HTML
        </button>
    </div>

    <div class="preview-box">
        <div class="html-content-wrapper container bg-white p-4 shadow-sm rounded">

            <h5 class="text-primary border-bottom pb-2 mb-3">
                <i class="fa fa-book"></i> Άσκηση 4.36
            </h5>
            <p>
                Να γράψετε πρόγραμμα που θα δέχεται ως είσοδο το πλήθος των ανδρών και το πλήθος
                των γυναικών που συμμετέχουν σε ένα συνέδριο και θα εμφανίζει:
            </p>
            <ol type="a">
                <li>το σύνολο των ατόμων που συμμετείχαν,</li>
                <li>το ποσοστό των ανδρών και</li>
                <li>το ποσοστό των γυναικών.</li>
            </ol>

        </div>
    </div>

    <script>
        function copyMezeHTML() {
            const wrapper = document.querySelector('.html-content-wrapper');
            if (!wrapper) return;
            const finalHtml = wrapper.outerHTML;
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(finalHtml).then(() => {
                    showSuccess();
                }).catch(() => {
                    fallbackCopy(finalHtml);
                });
            } else {
                fallbackCopy(finalHtml);
            }
        }

        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showSuccess();
            } catch (err) { }
            document.body.removeChild(textArea);
        }

        function showSuccess() {
            const btn = document.querySelector('.sticky-top button');
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fa fa-check"></i> Αντιγράφηκε!';
            btn.classList.replace('btn-success', 'btn-light');
            setTimeout(() => {
                btn.innerHTML = original;
                btn.classList.replace('btn-light', 'btn-success');
            }, 2000);
        }
    </script>
</body>

</html>
