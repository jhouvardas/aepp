<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3238"/>
      <stop offset="100%" style="stop-color:#16191c"/>
    </linearGradient>
  </defs>

  <!-- Φόντο με στρογγυλεμένες γωνίες (στυλ app icon) -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Λεπτό κίτρινο περίγραμμα -->
  <rect width="512" height="512" rx="100" fill="none" stroke="#ffc107" stroke-width="12" stroke-opacity="0.35"/>

  <!-- Σύμβολο </> -->
  <text x="256" y="248"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="192"
        font-weight="bold"
        fill="#ffc107">&lt;/&gt;</text>

  <!-- Λεπτή γραμμή διαχωρισμού -->
  <line x1="96" y1="330" x2="416" y2="330" stroke="#ffc107" stroke-width="2" stroke-opacity="0.3"/>

  <!-- ΑΕΠΠ -->
  <text x="256" y="418"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="76"
        font-weight="bold"
        fill="#dee2e6"
        letter-spacing="10">ΑΕΠΠ</text>
</svg>
